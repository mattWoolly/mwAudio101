#
# tests/golden/corpus/MANIFEST.toml — the provenance ledger for the golden corpus
# (docs/design/11 §7.1, §7.3; ADR-013 Layer 3). The single control that keeps a
# guess from silently hardening into a "regression-protected fact" [§1.3].
#
# Authored / appended ONLY by the guarded bless tool (tools/bless, arm64-only, task
# golden-10), NEVER by hand and NEVER as a test side-effect [§7.2; ADR-013 C10/C11].
# Each [[golden]] table records the full §7.3 field set for one blessed artifact:
# its blob SHA-256, who/when/where it was blessed, the exact render parameters, the
# corpus class + tolerance band (CLASS-FP), the FP-flag proof, the renderVersion it
# was blessed under (ADR-023 V11), and its ledger §2-§8 honesty labels (§7.4).
#
# This harness validates self-consistency and topology-faithfulness, NEVER measured
# SH-101 fidelity [§1.3; ADR-013 owner ratification]. honestyLabels tokens are the
# controlled vocabulary of research/13 §1.2 — clone-derived, reverse-engineered,
# theory/inference, community-disassembly, service-manual, disputed,
# software-emulation-artifact.
#
# The seed entries below are illustrative example blesses (placeholder hashes) that
# exercise both determinism classes and the honesty-label binding; the bless tool
# replaces / appends real entries as goldens are blessed on macOS arm64.

